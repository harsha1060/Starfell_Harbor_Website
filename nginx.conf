server {
    listen 80;
    
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # THE PROFESSIONAL FIX:
        # 1. Try to find a file that matches the URL ($uri)
        # 2. If no file, try to find a directory ($uri/)
        # 3. If it's a directory, Nginx automatically looks for index.html inside it
        # 4. If nothing is found, send them to the main index.html (useful for Single Page Apps)
        try_files $uri $uri/ /index.html;
    }

    # Standard error page
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
