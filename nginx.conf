server {
    listen 80;

    location / {
        root  /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ =404;   # ← changed from /index.html
    }

    # Cache static assets — good for repeat visitors
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        root    /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    error_page 404 /404.html;        # ← make a 404.html page
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}